name: 'Option C - Auto Commit Test IDs'

on:
  pull_request:
    paths:
      - 'tests/**/*.json'

permissions:
  contents: write

jobs:
  auto-add-test-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run add-test-ids script
        run: node scripts/add-test-ids.js

      - name: Commit IDs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add tests/ && git commit -m "chore: auto-add missing test IDs" && git push)