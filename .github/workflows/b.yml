name: 'Option B - Annotate Missing Test IDs'

on:
  pull_request:
    paths:
      - 'tests/**/*.json'

jobs:
  check-test-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check test IDs and annotate
        run: |
          EXIT_CODE=0
          for dialect in draft2020-12 draft2019-09 draft7 draft6 draft4; do
            output=$(node scripts/check-test-ids.js $dialect 2>&1) || EXIT_CODE=$?
            while IFS= read -r line; do
              if [[ $line == *"missing"* ]]; then
                echo "::error::$line"
              fi
            done <<< "$output"
          done
          exit $EXIT_CODE