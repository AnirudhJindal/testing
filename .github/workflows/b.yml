name: 'Option B - Annotate Missing Test IDs'

on:
  pull_request:
    paths:
      - 'tests/**/*.json'

jobs:
  check-test-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check test IDs and annotate
        run: |
          EXIT_CODE=0
          for dir in tests/draft2020-12 tests/draft2019-09 tests/draft7 tests/draft6 tests/draft4; do
            output=$(node scripts/check-test-ids.js $dir 2>&1) || EXIT_CODE=$?
            echo "$output"
            while IFS= read -r line; do
              if [[ $line == *"Missing ID"* ]] || [[ $line == *"Mismatched ID"* ]]; then
                echo "::error::$line"
              fi
            done <<< "$output"
          done
          exit $EXIT_CODE