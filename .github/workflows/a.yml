name: Suggest missing test IDs

on:
  pull_request:
    paths:
      - "tests/**/*.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest-test-ids:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Get changed test files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: "tests/**/*.json"

      - name: Generate missing test IDs
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            dialect=$(echo "$file" | sed 's|tests/||' | cut -d'/' -f1)
            node scripts/add-test-ids.js "$dialect" "$file"
          done

      - name: Suggest changes
        uses: parkerbxyz/suggest-changes@v1
        with:
          comment: "🚨 Missing test IDs detected — click **'Commit suggestion'** on each file to fix."