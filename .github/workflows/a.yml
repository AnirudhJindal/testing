name: 'Option A - Suggest Test IDs'

on:
  pull_request:
    paths:
      - 'tests/**/*.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest-test-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run add-test-ids script
        run: |
          node scripts/add-test-ids.js draft2020-12
          node scripts/add-test-ids.js draft2019-09
          node scripts/add-test-ids.js draft7
          node scripts/add-test-ids.js draft6
          node scripts/add-test-ids.js draft4
        continue-on-error: true

      - uses: parkerbxyz/suggest-changes@v3
        with:
          comment: 'Missing test IDs detected! Please accept these suggested changes to add them.'
          event: 'REQUEST_CHANGES'
