name: Suggest missing test IDs

on:
  pull_request:
    paths:
      - "tests/**/*.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest-test-ids:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm ci

      - name: Get changed test files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: "tests/**/*.json"

      - name: Generate missing test IDs
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            dialect=$(echo "$file" | sed 's|tests/||' | cut -d'/' -f1)
            node scripts/add-test-ids.js "$dialect" "$file"
          done

      # 🔥 SINGLE REVIEW, ALL DIFFS
      - name: Suggest all changes in one batch
        uses: parkerbxyz/suggest-changes@v3
        with:
          comment: |
            🚨 **Missing test IDs detected**

            Click **“Add suggestion to batch”** for each file,
            then click **“Commit all suggestions”** to fix everything
            in a single commit.
          event: REQUEST_CHANGES