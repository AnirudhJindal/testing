name: Suggest missing test IDs

on:
  pull_request:
    paths:
      - "tests/**/*.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest-test-ids:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Get changed test files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: "tests/**/*.json"

      - name: Add missing test IDs
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Processing $file"
            dialect=$(echo "$file" | sed 's|tests/||' | cut -d'/' -f1)
            node scripts/add-test-ids.js "$dialect" "$file"
          done

      # 🔥 THIS STEP CREATES THE "APPLY SUGGESTION" BUTTON
      - name: Suggest changes on PR
        uses: parkerbxyz/suggest-changes@v3
        with:
          comment: |
            🚨 **Missing test IDs detected**

            Click **“Apply suggestion”** or **“Apply all suggestions”**
            to automatically commit the generated test IDs.
          event: REQUEST_CHANGES