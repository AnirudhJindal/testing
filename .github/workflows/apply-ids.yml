name: apply-test-ids

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout PR files (THIS WAS THE MISSING PART)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # 2️⃣ Debug (optional but recommended once)
      - name: Debug SHAs
        run: |
          echo "BASE SHA: ${{ github.event.pull_request.base.sha }}"
          echo "HEAD SHA: ${{ github.event.pull_request.head.sha }}"
          git log -1 --oneline

      # 3️⃣ Setup Node
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # 4️⃣ Install deps (only if needed)
      - run: npm ci
        if: hashFiles('package-lock.json') != ''

      # 5️⃣ Fetch list of files changed in PR
      - name: Get PR changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "${{ github.event.pull_request.url }}/files" \
            > pr-files.json

      # 6️⃣ Run TRUSTED base-branch script on PR files
      - name: Apply missing test IDs
        run: |
          node scripts/add-missing-test-ids.js pr-files.json

      # 7️⃣ Commit back to PR branch
      - name: Commit and push changes
        run: |
          git config user.name "test-id-bot"
          git config user.email "test-id-bot@users.noreply.github.com"

          git status
          git add .
          git commit -m "chore: auto-add missing test IDs" || echo "No changes to commit"
          git push