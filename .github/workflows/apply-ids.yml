name: apply-test-ids

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1️⃣ Checkout BASE branch (trusted code)
      # --------------------------------------------------
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      # --------------------------------------------------
      # 2️⃣ Save trusted base script (VERY IMPORTANT)
      # --------------------------------------------------
      - name: Save base automation script
        run: |
          mkdir -p /tmp/base-scripts
          cp scripts/utils/add-test-ids.js /tmp/base-scripts/add-test-ids.js

      # --------------------------------------------------
      # 3️⃣ Checkout PR branch (files to be modified)
      # --------------------------------------------------
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # --------------------------------------------------
      # 4️⃣ Setup Node.js
      # --------------------------------------------------
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # --------------------------------------------------
      # 5️⃣ Install dependencies (if needed)
      # --------------------------------------------------
      - run: npm ci
        if: hashFiles('package-lock.json') != ''

      # --------------------------------------------------
      # 6️⃣ Fetch list of files changed in PR
      # --------------------------------------------------
      - name: Get PR changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "${{ github.event.pull_request.url }}/files" \
            > pr-files.json

      # --------------------------------------------------
      # 7️⃣ Run TRUSTED base script on PR files
      # --------------------------------------------------
      - name: Apply missing test IDs
        run: |
          node /tmp/base-scripts/add-test-ids.js pr-files.json

      # --------------------------------------------------
      # 8️⃣ Commit & push back to PR branch
      # --------------------------------------------------
      - name: Commit and push changes
        run: |
          git config user.name "test-id-bot"
          git config user.email "test-id-bot@users.noreply.github.com"

          git status
          git add .
          git commit -m "chore: auto-add missing test IDs" || echo "No changes to commit"
          git push