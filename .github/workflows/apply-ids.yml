name: Apply missing test IDs (auto)

on:
  pull_request_target:
    paths:
      - "tests/**/*.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-test-ids:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout BASE repo (trusted code)
      - name: Checkout base repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # 2️⃣ Save trusted script
      - name: Copy trusted fixer script
        run: |
          mkdir -p /tmp/trusted
          cp scripts/add-test-ids.js /tmp/trusted/

      # 3️⃣ Checkout PR code (UNTRUSTED)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      # 4️⃣ Apply fixes using TRUSTED script
      - name: Apply missing test IDs
        run: |
          for file in $(git diff --name-only origin/${{ github.event.pull_request.base.ref }} | grep '^tests/.*\.json'); do
            dialect=$(echo "$file" | sed 's|tests/||' | cut -d'/' -f1)
            node /tmp/trusted/add-test-ids.js "$dialect" "$file"
          done

      # 5️⃣ Commit & push if changed
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "chore: add missing test IDs"
            git push
          fi